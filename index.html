<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KLP48 Member Sorter</title>
    <meta name="description" content="Rank your favorite KLP48 members and find your bias! Share your Top 3 and Tier lists with the community." />

    <!-- Open Graph (Facebook/Discord) -->
    <meta property="og:title" content="KLP48 Member Sorter" />
    <meta property="og:description" content="Pick your Oshi! The official-feel ranking app for KLP48 fans." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KLP48 Member Sorter 🏆" />
    <meta name="twitter:description" content="I just ranked my Top 3 KLP48 members. Who is your Oshi?" />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@600;700;800;900&family=Fredoka:wght@500;600;700&family=Caveat:wght@500;700&display=swap"
    />
    <style>
      /* Static pre-boot loader — visible the moment HTML parses, before
         React mounts. React's Preloader takes over once the bundle runs. */
      #boot-loader {
        position: fixed;
        inset: 0;
        background: #fff8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.3s ease;
      }
      #boot-loader .ring {
        width: 56px;
        height: 56px;
        border: 5px solid #a7f3d0;
        border-top-color: #ec4899;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="boot-loader" aria-hidden="true"><div class="ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
